version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: loopin_n8n_prod
    restart: always
    ports:
      - "127.0.0.1:5678:5678" # Only exposed on localhost
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Rome}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
